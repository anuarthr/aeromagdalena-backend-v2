spring.application.name=aeromagdalena

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aeromagdalena}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:aeromagdalena}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:aeromagdalena123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Server Port
server.port=9090

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:mysecretJ7Q16xGQkmEbE3fv4ecEmDkT5k3TkZZFg6srLt2YmpkEtjPfS28F3u}
app.jwt.expirationMs=${APP_JWT_EXPIRATION_MS:43200000}
